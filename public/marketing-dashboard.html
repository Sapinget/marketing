<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Marketing Dashboard Archive Pointer</title>
  <meta http-equiv="refresh" content="0; url=/">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: "Instrument Sans", system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    .archive-pointer {
      max-width: 520px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 24px 48px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    p {
      margin: 0 0 12px;
      line-height: 1.6;
      color: #475569;
    }

    a {
      color: #4f63ff;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="archive-pointer">
    <h1>Marketing Dashboard Dipindahkan</h1>
    <p>Halaman ini dipindahkan ke route Laravel utama dashboard.</p>
    <p>Lanjutkan ke <a href="/">/</a>.</p>
  </main>
</body>
</html>
